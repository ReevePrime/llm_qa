# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: AskTheDocs

on:
  push:
    branches: ['**']
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4        
      - uses: actions/setup-python@v5     
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: pytest       

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Login to ACR
        run: az acr login --name askthedocs
      - name: Build and push Docker image
        run: |
          docker build -t askthedocs.azurecr.io/my-app:${{ github.sha }} .
          docker push askthedocs.azurecr.io/my-app:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Deploy to Azure Container App
        run: |
          az containerapp update \
            --name askthedocs \
            --resource-group RAG_tool \
            --image askthedocs.azurecr.io/my-app:${{ github.sha }}
